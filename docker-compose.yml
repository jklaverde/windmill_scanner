version: "3.9"

# Single-image deployment — frontend + backend in one container, SQLite by default.
# To use PostgreSQL, set DATABASE_URL in .env (see comments there).

services:
  app:
    build: .
    ports:
      - "80:80"
    volumes:
      - windmill_data:/app/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  windmill_data:
