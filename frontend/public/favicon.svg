<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#1e293b"/>

  <!-- Tower: tapered mast below hub -->
  <path d="M15.2 14.5 L14.2 27.5 H17.8 L16.8 14.5 Z" fill="#94a3b8"/>

  <!-- Three blades — identical leaf shape rotated 120° each around the hub -->
  <path d="M16 13 C14.6 11 14 8 16 4.5 C18 8 17.4 11 16 13Z"
        fill="white" transform="rotate(0   16 13)"/>
  <path d="M16 13 C14.6 11 14 8 16 4.5 C18 8 17.4 11 16 13Z"
        fill="white" transform="rotate(120 16 13)"/>
  <path d="M16 13 C14.6 11 14 8 16 4.5 C18 8 17.4 11 16 13Z"
        fill="white" transform="rotate(240 16 13)"/>

  <!-- Hub -->
  <circle cx="16" cy="13" r="2.2" fill="white"/>
</svg>
